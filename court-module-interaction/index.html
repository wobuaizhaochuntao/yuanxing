<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>法院运营管理交互稿</title>
  <style>
    :root {
      --bg: #f5f7fa;
      --panel: #ffffff;
      --line: #d8dee8;
      --line-strong: #b8c1cf;
      --text: #202938;
      --muted: #667085;
      --ink: #101828;
      --blue: #1d4ed8;
      --blue-soft: #eaf1ff;
      --green: #147a5c;
      --green-soft: #e8f6ef;
      --amber: #a15c07;
      --amber-soft: #fff3db;
      --red: #b42318;
      --red-soft: #fde8e7;
      --gray-soft: #eef2f6;
      --shadow: 0 10px 26px rgba(16, 24, 40, 0.10);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-width: 1280px;
      color: var(--text);
      background: var(--bg);
    }

    button, input, select {
      font: inherit;
    }

    button {
      border: 0;
      background: transparent;
      color: inherit;
      cursor: pointer;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 216px 1fr;
    }

    .sidebar {
      background: #172033;
      color: #fff;
      padding: 18px 12px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 4px 8px 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
    }

    .brand-mark {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: #eef4ff;
      color: #172033;
      font-weight: 800;
    }

    .brand strong {
      display: block;
      font-size: 16px;
      line-height: 20px;
    }

    .brand span {
      display: block;
      font-size: 12px;
      color: #c2c9d6;
      line-height: 18px;
    }

    .nav {
      display: grid;
      gap: 6px;
    }

    .nav button {
      display: grid;
      grid-template-columns: 24px 1fr auto;
      align-items: center;
      gap: 8px;
      height: 42px;
      padding: 0 10px;
      color: #d6dce8;
      border-radius: 7px;
      text-align: left;
    }

    .nav button.active {
      color: #fff;
      background: rgba(255, 255, 255, 0.12);
    }

    .count {
      min-width: 22px;
      height: 20px;
      border-radius: 10px;
      display: inline-grid;
      place-items: center;
      background: rgba(255, 255, 255, 0.14);
      color: #fff;
      font-size: 12px;
    }

    .main {
      min-width: 0;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .btn {
      height: 36px;
      border-radius: 6px;
      padding: 0 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      white-space: nowrap;
    }

    .btn.primary {
      color: #fff;
      background: var(--blue);
    }

    .btn.ghost {
      background: #fff;
      color: var(--text);
      border: 1px solid var(--line);
    }

    .modebar {
      margin: 20px 20px 0;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }

    .mode-left {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .mode-label {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .mode-tabs {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .mode-tab {
      height: 38px;
      min-width: 110px;
      border-radius: 6px;
      padding: 0 14px;
      color: var(--text);
      border: 1px solid var(--line);
      background: #fff;
      font-weight: 600;
    }

    .mode-tab.active {
      color: #fff;
      background: var(--blue);
      border-color: var(--blue);
    }

    .global-owner {
      display: grid;
      grid-template-columns: auto 180px;
      align-items: center;
      gap: 10px;
    }

    .content {
      min-width: 0;
      padding: 14px 20px 20px;
      display: grid;
      gap: 12px;
      align-content: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      min-width: 0;
      overflow: hidden;
    }

    .filters {
      padding: 18px;
      display: grid;
      gap: 16px;
    }

    .filter-grid {
      display: grid;
      grid-template-columns: 1.2fr 1fr 1fr 1.55fr 1.55fr 1fr;
      gap: 14px;
      align-items: end;
    }

    .filter-group {
      display: grid;
      gap: 6px;
    }

    .filter-group label {
      color: var(--muted);
      font-size: 12px;
    }

    .input, .select {
      width: 100%;
      height: 36px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      outline: none;
      padding: 0 10px;
    }

    .date-pair {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .filter-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      border-top: 1px solid var(--line);
      padding-top: 16px;
    }

    .tag-filter {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .filter-block {
      display: grid;
      gap: 10px;
    }

    .decision-filter {
      display: grid;
      grid-template-columns: repeat(6, minmax(140px, 1fr));
      gap: 8px;
      align-items: stretch;
    }

    .decision-card {
      min-height: 72px;
      border-radius: 7px;
      border: 1px solid var(--line);
      background: #fff;
      padding: 9px 10px;
      display: grid;
      align-content: start;
      gap: 5px;
      text-align: left;
    }

    .decision-card strong {
      color: var(--text);
      font-size: 13px;
      line-height: 18px;
    }

    .decision-card span {
      color: var(--muted);
      font-size: 12px;
      line-height: 17px;
      white-space: normal;
    }

    .decision-card.active {
      border-color: #9db9ff;
      background: var(--blue-soft);
      box-shadow: inset 3px 0 0 var(--blue);
    }

    .decision-card.active strong {
      color: var(--blue);
    }

    .chip {
      height: 28px;
      border-radius: 14px;
      padding: 0 10px;
      display: inline-flex;
      align-items: center;
      color: #465568;
      background: var(--gray-soft);
      font-size: 12px;
      border: 1px solid transparent;
    }

    .chip.active {
      color: var(--blue);
      background: var(--blue-soft);
      border-color: #b7ccff;
    }

    .tab-buttons {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .tab {
      height: 46px;
      min-width: 104px;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      padding: 0 12px;
    }

    .tab.active {
      color: var(--blue);
      border-bottom-color: var(--blue);
      font-weight: 600;
    }

    .sort-note {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .table-wrap {
      overflow: auto;
      max-height: calc(100vh - 286px);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1760px;
      font-size: 13px;
    }

    th, td {
      border-bottom: 1px solid var(--line);
      padding: 10px 10px;
      text-align: left;
      vertical-align: middle;
      white-space: nowrap;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 1;
      color: var(--muted);
      background: #f9fafb;
      font-weight: 600;
    }

    tr:hover td {
      background: #fbfdff;
    }

    .court-cell {
      display: grid;
      gap: 5px;
      white-space: normal;
      min-width: 230px;
    }

    .court-cell button {
      text-align: left;
      color: var(--blue);
      font-weight: 600;
      line-height: 19px;
    }

    .court-cell span {
      color: var(--muted);
      font-size: 12px;
    }

    .core-data {
      display: grid;
      gap: 4px;
      min-width: 180px;
    }

    .core-row {
      display: flex;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
    }

    .core-row strong {
      color: var(--text);
      font-size: 13px;
    }

    .num {
      color: var(--ink);
      font-weight: 650;
    }

    .badge {
      height: 22px;
      border-radius: 11px;
      padding: 0 8px;
      display: inline-flex;
      align-items: center;
      font-size: 12px;
    }

    .badge.green { color: var(--green); background: var(--green-soft); }
    .badge.amber { color: var(--amber); background: var(--amber-soft); }
    .badge.red { color: var(--red); background: var(--red-soft); }
    .badge.blue { color: var(--blue); background: var(--blue-soft); }

    .badge.gray { color: #475467; background: var(--gray-soft); }

    .row-tags {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      min-width: 180px;
      white-space: normal;
    }

    .mini {
      font-size: 12px;
      color: var(--muted);
    }

    .help-tip {
      position: relative;
      width: 17px;
      height: 17px;
      margin-left: 4px;
      border: 1px solid #b8c2d1;
      border-radius: 50%;
      color: #667085;
      background: #fff;
      font-size: 11px;
      line-height: 15px;
      text-align: center;
      vertical-align: -1px;
    }

    .help-tip::after {
      content: attr(data-tip);
      position: absolute;
      top: calc(100% + 7px);
      left: 50%;
      z-index: 8;
      width: 220px;
      padding: 8px 10px;
      border-radius: 6px;
      background: #1f2937;
      color: #fff;
      font-size: 12px;
      font-weight: 400;
      line-height: 18px;
      white-space: normal;
      transform: translateX(-50%);
      opacity: 0;
      pointer-events: none;
    }

    .help-tip:hover::after,
    .help-tip:focus-visible::after {
      opacity: 1;
    }

    .empty {
      padding: 36px;
      color: var(--muted);
      text-align: center;
      display: none;
    }

    .drawer-mask {
      position: fixed;
      inset: 0;
      display: none;
      justify-content: flex-end;
      background: rgba(15, 23, 42, 0.32);
      z-index: 20;
    }

    .drawer-mask.open {
      display: flex;
    }

    .drawer {
      width: min(1380px, calc(100vw - 48px));
      min-height: 100%;
      background: #fff;
      box-shadow: var(--shadow);
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    .drawer-head, .drawer-foot {
      padding: 16px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .drawer-foot {
      border-top: 1px solid var(--line);
      border-bottom: 0;
      justify-content: flex-end;
    }

    .drawer-head h2 {
      margin: 0;
      font-size: 17px;
      color: var(--ink);
    }

    .drawer-body {
      padding: 16px;
      overflow: auto;
      display: grid;
      gap: 14px;
      align-content: start;
    }

    .section {
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }

    .section h3 {
      margin: 0;
      padding: 11px 12px;
      color: var(--ink);
      background: #f9fafb;
      border-bottom: 1px solid var(--line);
      font-size: 14px;
    }

    .section-body {
      padding: 12px;
      display: grid;
      gap: 10px;
    }

    .kv {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 10px;
      color: var(--text);
      font-size: 13px;
      line-height: 20px;
    }

    .kv span:first-child {
      color: var(--muted);
    }

    .drawer-metrics {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 8px;
    }

    .drawer-metric {
      min-width: 0;
      padding: 10px;
      background: #f7f9fc;
      border-radius: 6px;
    }

    .drawer-metric span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      line-height: 18px;
    }

    .drawer-metric strong {
      display: block;
      margin-top: 3px;
      color: var(--ink);
      font-size: 17px;
      line-height: 22px;
    }

    .drawer-info-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      column-gap: 24px;
      row-gap: 10px;
    }

    .drawer-info-item {
      min-width: 0;
      display: grid;
      gap: 2px;
      font-size: 13px;
      line-height: 20px;
    }

    .drawer-info-item > span:first-child {
      color: var(--muted);
      font-size: 12px;
    }

    .drawer-info-item > span:last-child {
      color: var(--text);
      white-space: normal;
      overflow-wrap: anywhere;
    }

    .section h3 .mini {
      margin-left: 6px;
      font-weight: 400;
    }

    .section-head {
      padding: 11px 12px;
      background: #f9fafb;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .section-title {
      display: grid;
      gap: 4px;
      min-width: 0;
    }

    .section-title h3 {
      padding: 0;
      border: 0;
      background: transparent;
    }

    .drawer-case-tabs {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .drawer-case-tab {
      height: 30px;
      padding: 0 12px;
      border-radius: 15px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
    }

    .drawer-case-tab.active {
      color: var(--blue);
      border-color: #b7ccff;
      background: var(--blue-soft);
    }

    .drawer-case-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .drawer-case-table-wrap {
      overflow: auto;
      max-height: calc(100vh - 410px);
    }

    .drawer-case-table {
      width: 100%;
      min-width: 1560px;
      font-size: 12px;
    }

    .drawer-case-table th,
    .drawer-case-table td {
      padding: 9px 10px;
    }

    .table-cell-stack {
      display: grid;
      gap: 3px;
      white-space: normal;
      min-width: 112px;
    }

    .table-cell-stack strong {
      color: var(--ink);
      font-size: 12px;
      line-height: 18px;
    }

    .table-cell-stack span {
      color: var(--muted);
      font-size: 11px;
      line-height: 17px;
    }

    .case-link {
      color: var(--blue);
      font-weight: 700;
      text-align: left;
      padding: 0;
    }

    .check-cell {
      width: 36px;
      text-align: center;
    }

    .case-note-cell {
      max-width: 280px;
      min-width: 220px;
      white-space: normal;
      line-height: 18px;
    }

    .case-note-cell span {
      display: -webkit-box;
      overflow: hidden;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
    }

    @media (max-width: 1000px) {
      .drawer {
        width: 100vw;
      }

      .drawer-metrics,
      .drawer-info-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .section-head,
      .drawer-case-toolbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .drawer-case-tabs {
        justify-content: flex-start;
      }
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      background: #111827;
      color: #fff;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 160ms ease;
      z-index: 30;
    }

    .toast.show {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">法</div>
        <div>
          <strong>诉讼运营台</strong>
          <span>法院运营管理</span>
        </div>
      </div>
      <nav class="nav" aria-label="主导航">
        <button class="active"><span>▦</span><span>法院运营</span><span class="count">3000</span></button>
        <button><span>□</span><span>案件池</span><span class="count">10w</span></button>
        <button><span>◇</span><span>递交任务</span><span class="count">286</span></button>
        <button><span>○</span><span>跟进任务</span><span class="count">173</span></button>
        <button><span>!</span><span>异常处理</span><span class="count">42</span></button>
      </nav>
    </aside>

    <main class="main">
      <section class="modebar">
        <div class="mode-left">
          <span class="mode-label">作业模式</span>
          <div class="mode-tabs" id="tabs">
            <button class="mode-tab active" data-tab="submit">递交工作台</button>
            <button class="mode-tab" data-tab="follow">跟进工作台</button>
          </div>
        </div>
        <div class="global-owner">
          <span class="mode-label">案件负责人</span>
          <select class="select" id="caseOwner">
            <option value="我负责的案件">我负责的案件</option>
            <option value="all">所有</option>
            <option value="王律助">王律助</option>
            <option value="李律师">李律师</option>
            <option value="陈律助">陈律助</option>
            <option value="赵纯涛">赵纯涛</option>
          </select>
        </div>
      </section>

      <section class="content">
        <div class="panel filters">
          <div class="filter-block" id="submitDecisionFilters">
            <span class="mini">快筛</span>
            <div class="decision-filter" id="decisionFilter">
              <button class="decision-card active" data-decision-group="profileChanged">
                <strong>画像变化待递交</strong>
                <span>法院变可受理，需盘点案件递交</span>
              </button>
              <button class="decision-card" data-decision-group="auditException">
                <strong>审核异常</strong>
                <span>受理法院给了负面反馈（非转邮寄）</span>
              </button>
              <button class="decision-card" data-decision-group="auditOverdue">
                <strong>审核逾期</strong>
                <span>递交超过 10 个工作日仍无审核结果</span>
              </button>
              <button class="decision-card" data-decision-group="limitedConfirm">
                <strong>限量待确认</strong>
                <span>受理&amp;限量法院，需确认递交节奏</span>
              </button>
              <button class="decision-card" data-decision-group="nonAuto">
                <strong>不自动递交法院</strong>
                <span>微信、邮件等非线上递交需确认</span>
              </button>
              <button class="decision-card" data-decision-group="autoNormal">
                <strong>自动兜底</strong>
                <span>系统自动递交</span>
              </button>
            </div>
          </div>
          <div class="filter-grid">
            <div class="filter-group">
              <label>法院名称</label>
              <input class="input" id="courtName" placeholder="输入法院名称" />
            </div>
            <div class="filter-group">
              <label>受理画像</label>
              <select class="select" id="acceptanceProfile">
                <option value="all">全部</option>
                <option value="受理">受理</option>
                <option value="仅调解">仅调解</option>
                <option value="待定">待定</option>
                <option value="拒不受理">拒不受理</option>
              </select>
            </div>
            <div class="filter-group">
              <label>递交模式</label>
              <select class="select" id="submitMode">
                <option value="all">全部</option>
                <option value="自动递交">自动递交</option>
                <option value="限量">限量</option>
                <option value="待定">待定</option>
                <option value="不自动递交">不自动递交</option>
              </select>
            </div>
            <div class="filter-group">
              <label>计划递交时间</label>
              <div class="date-pair">
                <input class="input" type="date" id="planSubmitFrom" />
                <input class="input" type="date" id="planSubmitTo" />
              </div>
            </div>
            <div class="filter-group">
              <label>最近递交时间</label>
              <div class="date-pair">
                <input class="input" type="date" id="lastSubmitFrom" />
                <input class="input" type="date" id="lastSubmitTo" />
              </div>
            </div>
            <div class="filter-group">
              <label>待审核超期</label>
              <select class="select" id="reviewOverdue">
                <option value="all">全部</option>
                <option value="yes">有超 10 天</option>
                <option value="no">无超 10 天</option>
              </select>
            </div>
          </div>

          <div class="filter-footer">
            <div class="tag-filter" id="tagFilter">
              <span class="mini">法院标签</span>

    const el = (id) => document.getElementById(id);

    function daysSince(dateString) {
      const date = new Date(dateString + "T00:00:00+08:00");
      return Math.floor((today - date) / 86400000);
    }

    function inRange(value, from, to) {
      if (from && value < from) return false;
      if (to && value > to) return false;
      return true;
    }

    function ownerMatches(court) {
      const owner = el("caseOwner").value;
      if (owner === "all") return true;
      return court.caseOwners.includes(owner);
    }

    function getDecisionGroup(court) {
      if (court.profileChanged) return "profileChanged";
      if (court.auditExceptionCount > 0) return "auditException";
      if (court.pendingReviewOver10 > 0) return "auditOverdue";
      if (court.submitMode === "限量") return "limitedConfirm";
      if (court.submitMode === "不自动递交") return "nonAuto";
      return "autoNormal";
    }

    function decisionGroupLabel(group) {
      const labels = {
        auditOverdue: "审核逾期",
        auditException: "审核异常",
        limitedConfirm: "限量待确认",
        nonAuto: "不自动递交法院",
        profileChanged: "画像变化待递交",
        autoNormal: "自动兜底"
      };
      return labels[group] || "其他";
    }

    function decisionGroupMatches(court) {
      if (activeTab !== "submit") return true;
      const group = getDecisionGroup(court);
      return group === activeDecisionGroup;
    }

    function submitModeMatches(court) {
      const mode = el("submitMode").value;
      return mode === "all" || court.submitMode === mode;
    }

    function acceptanceMatches(court) {
      const acceptance = el("acceptanceProfile").value;
      return acceptance === "all" || court.acceptanceProfile === acceptance;
    }

    function reviewOverdueMatches(court) {
      const value = el("reviewOverdue").value;
      if (value === "yes") return court.pendingReviewOver10 > 0;
      if (value === "no") return court.pendingReviewOver10 === 0;
      return true;
    }

    function getFilteredCourts() {
      const name = el("courtName").value.trim();
      let result = courts.filter((court) => {
        const matchName = !name || court.name.includes(name);
        const matchTags = [...selectedTags].every((tag) => court.tags.includes(tag));
        return matchName &&
          submitModeMatches(court) &&
          acceptanceMatches(court) &&
          reviewOverdueMatches(court) &&
          decisionGroupMatches(court) &&
          matchTags &&
          ownerMatches(court) &&
          inRange(court.planSubmit, el("planSubmitFrom").value, el("planSubmitTo").value) &&
          inRange(court.lastSubmit, el("lastSubmitFrom").value, el("lastSubmitTo").value);
      });

      if (activeTab === "submit") {
        const groupWeight = {
          profileChanged: 1,
          auditException: 2,
          auditOverdue: 3,
          limitedConfirm: 4,
          nonAuto: 5,
          autoNormal: 6
        };
        result = result.sort((a, b) =>
          groupWeight[getDecisionGroup(a)] - groupWeight[getDecisionGroup(b)] ||
          b.pendingSubmit - a.pendingSubmit ||
          daysSince(b.lastManualReview) - daysSince(a.lastManualReview) ||
          b.caseAmount - a.caseAmount
        );
      } else if (activeTab === "follow") {
        result = result.sort((a, b) =>
          daysSince(b.lastFollow) - daysSince(a.lastFollow) ||
          b.review - a.review
        );
      } else {
        result = result.sort((a, b) =>
          b.totalCases - a.totalCases ||
          (b.submitReview + b.review) - (a.submitReview + a.review)
        );
      }

      return result;
    }

    function badgeForAcceptance(profile) {
      const tone = profile === "受理" ? "green" : profile === "仅调解" ? "blue" : profile === "待定" ? "amber" : "red";
      return `<span class="badge ${tone}">${profile}</span>`;
    }

    function badgeForSubmitMode(mode) {
      const tone = mode === "自动递交" ? "green" : mode === "限量" ? "amber" : mode === "不自动递交" ? "gray" : "blue";
      return `<span class="badge ${tone}">${mode}</span>`;
    }

    function badgeForDecisionGroup(court) {
      const group = getDecisionGroup(court);
      const tone = group === "auditOverdue" ? "red" : group === "auditException" ? "red" : group === "limitedConfirm" ? "amber" : group === "profileChanged" ? "blue" : group === "nonAuto" ? "gray" : "green";
      return `<span class="badge ${tone}">${decisionGroupLabel(group)}</span>`;
    }

    function followBadge(date) {
      const days = daysSince(date);
      if (days > 30) return `<span class="badge red">${date} · ${days} 天</span>`;
      if (days > 15) return `<span class="badge amber">${date} · ${days} 天</span>`;
      return `<span class="badge green">${date} · ${days} 天</span>`;
    }

      const heads = {
        submit: [

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function daysSinceDateTime(value) {
      if (!value || value === "-") return 999;
      return daysSince(value.split(" ")[0]);
    }

    function formatMoney(value) {
      return value.toLocaleString("zh-CN", {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });
    }

    function getCourtSubmissionCases(court) {
      const primary = court.submissionCase;
      const others = Object.entries(submissionCaseSamples)
        .filter(([courtId]) => courtId !== court.id)
        .map(([, caseItem]) => ({ ...caseItem, defendantRegion: court.provinceCity }));
      return [primary, ...others];
    }

    function buildRecommendationReason(caseItem, submitGap, notMailed) {
      if (caseItem.isFiled) return "已立案，可转到“已立案”查看立案原因。";
      const reasons = [];
      if (caseItem.latestSubmit === "-") {
        reasons.push("最近未递交");
      } else if (submitGap >= 7) {
        reasons.push(`${submitGap} 天未递交`);
      }
      if (notMailed) {
        reasons.push("未邮寄");
      } else if (caseItem.mailCount > 0) {
        reasons.push(`已邮寄 ${caseItem.mailCount} 次`);
      }
      if (caseItem.claimAmount >= 10000) {
        reasons.push("诉请金额较高");
      }
      if (caseItem.quickTag === "审核逾期") {
        reasons.push("审核需推进");
      } else if (caseItem.quickTag === "画像变化") {
        reasons.push("画像变化需重看");
      } else if (caseItem.quickTag === "限量待确认") {
        reasons.push("本期递交需确认");
      }
      reasons.push("当前 SPV 优先保留 1 件");
      return reasons.slice(0, 4).join(" · ");
    }

    function decorateCaseItem(caseItem) {
      const submitGap = caseItem.latestSubmit === "-" ? 999 : daysSinceDateTime(caseItem.latestSubmit);
      const neverSubmitted = caseItem.submitCount === 0 || caseItem.latestSubmit === "-";
      const notMailed = caseItem.mailCount === 0 && caseItem.mailStatus === "未邮寄";
      const needsRetry = caseItem.auditStatus.includes("待重新递交")
        || caseItem.quickTag === "审核逾期"
        || caseItem.quickTag === "画像变化";
      const amountScore = Math.min(caseItem.claimAmount / 1500, 24);
      const score = (neverSubmitted ? 36 : Math.min(submitGap, 40))
        + (notMailed ? 22 : 6)
        + amountScore
        + (needsRetry ? 10 : 0)
        - (caseItem.submitCount * 4)
        - (caseItem.isFiled ? 999 : 0);
      return {
        ...caseItem,
        submitGap,
        recommendationScore: score,
        recommendationReason: buildRecommendationReason(caseItem, submitGap, notMailed)
      };
    }

    function getDrawerCaseBuckets(court) {
      const allCases = getCourtSubmissionCases(court)
        .map(decorateCaseItem)
        .sort((a, b) =>
          Number(a.isFiled) - Number(b.isFiled) ||
          b.recommendationScore - a.recommendationScore ||
          b.claimAmount - a.claimAmount
        );
      const pendingCases = allCases.filter((caseItem) => !caseItem.isFiled);
      const recommendedMap = new Map();
      pendingCases
        .sort((a, b) =>
          b.recommendationScore - a.recommendationScore ||
          b.claimAmount - a.claimAmount
        )
        .forEach((caseItem) => {
          if (!recommendedMap.has(caseItem.spv)) {
            recommendedMap.set(caseItem.spv, caseItem);
          }
        });
      const recommendedCases = [...recommendedMap.values()];
      const filedCases = allCases
        .filter((caseItem) => caseItem.isFiled)
        .sort((a, b) => daysSinceDateTime(a.latestSubmit) - daysSinceDateTime(b.latestSubmit));
      const visibleCases = activeCaseTab === "recommended"
        ? recommendedCases
        : activeCaseTab === "filed"
          ? filedCases
          : pendingCases;
      return { allCases, pendingCases, recommendedCases, filedCases, visibleCases };
    }

    function getSelectedDrawerCases(court) {
      const { pendingCases } = getDrawerCaseBuckets(court);
      return pendingCases.filter((caseItem) => selectedCaseIds.has(caseItem.caseId));

      selectedCaseIds.clear();

    function syncDrawerActions(court) {
      const selectedCases = getSelectedDrawerCases(court);

    function renderDrawer(court) {
      const { recommendedCases, filedCases, visibleCases } = getDrawerCaseBuckets(court);
      const selectedCases = getSelectedDrawerCases(court);
      const selectedSpvCount = new Set(selectedCases.map((caseItem) => caseItem.spv)).size;
      const helperText = activeCaseTab === "recommended"
        ? "按“最近没交、未邮寄、金额较大、每个 SPV 1 件”优先推荐。"
        : activeCaseTab === "filed"
          ? "用于快速回看已立案案件和对应立案原因。"
          : "可在全部待递交案件里补充调整递交选择。";
      const caseSummary = activeCaseTab === "filed"
        ? `已立案 ${filedCases.length} 件，可快速回看立案原因`
        : selectedCases.length
          ? `已选 ${selectedCases.length} 件 · 覆盖 ${selectedSpvCount} 个 SPV`
          : "当前还没有选中要生成递交任务的案件";
      el("drawerTitle").textContent = court.name;
      el("drawerBody").innerHTML = `
        <div class="section">
          <h3>法院递交核心信息</h3>

              <div class="drawer-metric"><span>待递交金额</span><strong>${court.caseAmount.toLocaleString()} 万</strong></div>
              <div class="drawer-metric"><span>线上待审核</span><strong>${court.onlinePendingReview.toLocaleString()}</strong></div>
              <div class="drawer-metric"><span>审核超 10 天</span><strong>${court.pendingReviewOver10}</strong></div>
              <div class="drawer-metric"><span>反馈异常</span><strong>${court.auditExceptionCount}</strong></div>
              <div class="drawer-metric"><span>已立案</span><strong>${court.filed.toLocaleString()}</strong></div>
            </div>
            <div class="drawer-info-grid">
              <div class="drawer-info-item"><span>受理画像</span><span>${badgeForAcceptance(court.acceptanceProfile)}</span></div>
              <div class="drawer-info-item"><span>递交模式</span><span>${badgeForSubmitMode(court.submitMode)}</span></div>
              <div class="drawer-info-item"><span>递交方式</span><span>${court.submitChannel}</span></div>
              <div class="drawer-info-item"><span>限量规则</span><span>${court.limitRule}</span></div>
              <div class="drawer-info-item"><span>计划递交时间</span><span>${court.planSubmit}</span></div>
              <div class="drawer-info-item"><span>最近递交时间</span><span>${court.lastSubmit}</span></div>
              <div class="drawer-info-item"><span>待递交构成</span><span>未递交 ${court.pendingUnsubmitted}、回收池 ${court.pendingRecovered}、拒不受理 ${court.pendingRejected}</span></div>
              <div class="drawer-info-item"><span>法院标签</span><span>${court.tags.join("、")}</span></div>
              <div class="drawer-info-item"><span>备注信息</span><span>${court.remark}</span></div>
            </div>
          </div>
        </div>
        <div class="section">
          <div class="section-head">
            <div class="section-title">

              <button class="drawer-case-tab ${activeCaseTab === "recommended" ? "active" : ""}" data-case-tab="recommended">推荐递交 ${recommendedCases.length}</button>
              <button class="drawer-case-tab ${activeCaseTab === "all" ? "active" : ""}" data-case-tab="all">全部待递交案件 ${court.pendingSubmit.toLocaleString()}</button>
              <button class="drawer-case-tab ${activeCaseTab === "filed" ? "active" : ""}" data-case-tab="filed">已立案 ${filedCases.length}</button>
            </div>
          </div>
          <div class="section-body">
            <div class="drawer-case-toolbar">
              <span class="mini">待递交 ${court.pendingSubmit.toLocaleString()} 件 · 当前展示 ${visibleCases.length} 件</span>
              <span class="mini">${caseSummary}</span>

            <div class="drawer-case-table-wrap">

    function openDrawer(courtId) {
      const court = courts.find((item) => item.id === courtId);
      if (!court) return;
      activeDrawerCourtId = courtId;
      activeCaseTab = "recommended";
      seedRecommendedSelection(court);
      renderDrawer(court);
      el("drawerMask").classList.add("open");
    }

    function showToast(text) {
      el("toast").textContent = text;
      el("toast").classList.add("show");
      window.setTimeout(() => el("toast").classList.remove("show"), 1500);
    }

    function resetFilters() {
      ["courtName", "planSubmitFrom", "planSubmitTo", "lastSubmitFrom", "lastSubmitTo"].forEach((id) => el(id).value = "");
      el("acceptanceProfile").value = "all";
      el("reviewOverdue").value = "all";
      el("submitMode").value = "all";
      el("caseOwner").value = "我负责的案件";
      activeDecisionGroup = "profileChanged";
      document.querySelectorAll("[data-decision-group]").forEach((button) => button.classList.toggle("active", button.dataset.decisionGroup === "profileChanged"));
      selectedTags.clear();
      document.querySelectorAll("[data-tag]").forEach((button) => button.classList.remove("active"));
      renderRows();
    }

    document.addEventListener("input", (event) => {
      if (event.target.matches(".input")) renderRows();
    });

    document.addEventListener("change", (event) => {
      if (event.target.matches("[data-case-toggle]")) {
        const caseId = event.target.dataset.caseToggle;
        if (event.target.checked) {
          selectedCaseIds.add(caseId);
        } else {
          selectedCaseIds.delete(caseId);
        }
        if (activeDrawerCourtId) {
          renderDrawer(courts.find((item) => item.id === activeDrawerCourtId));
        }
        return;
      }

      if (event.target.matches("[data-case-select-all]")) {
        const court = courts.find((item) => item.id === activeDrawerCourtId);
        if (!court) return;
        const { visibleCases } = getDrawerCaseBuckets(court);
        visibleCases.filter((caseItem) => !caseItem.isFiled).forEach((caseItem) => {
          if (event.target.checked) {
            selectedCaseIds.add(caseItem.caseId);
          } else {
            selectedCaseIds.delete(caseItem.caseId);
          }
        });
        renderDrawer(court);
        return;
      }

      if (event.target.matches(".select") || event.target.matches(".input")) renderRows();
    });

    document.addEventListener("click", (event) => {
      const tab = event.target.closest("[data-tab]");
      if (tab) {
        activeTab = tab.dataset.tab;
        document.querySelectorAll("[data-tab]").forEach((button) => button.classList.toggle("active", button === tab));
        renderRows();
        return;
      }

      const decisionButton = event.target.closest("[data-decision-group]");
      if (decisionButton) {
        activeDecisionGroup = decisionButton.dataset.decisionGroup;
        document.querySelectorAll("[data-decision-group]").forEach((button) => button.classList.toggle("active", button === decisionButton));
        renderRows();
        return;
      }

      const caseTab = event.target.closest("[data-case-tab]");
      if (caseTab) {
        const court = courts.find((item) => item.id === activeDrawerCourtId);
        if (!court) return;
        activeCaseTab = caseTab.dataset.caseTab;
        renderDrawer(court);
        return;
      }

      const tag = event.target.closest("[data-tag]");
      if (tag) {
        const value = tag.dataset.tag;
        if (selectedTags.has(value)) {
          selectedTags.delete(value);
          tag.classList.remove("active");
        } else {
          selectedTags.add(value);
          tag.classList.add("active");
        }
        renderRows();
        return;
      }

      const caseDetail = event.target.closest("[data-case-detail]");
      if (caseDetail) {
        showToast(`已跳转到案件 ${caseDetail.dataset.caseDetail} 详情（示意）`);
        return;
      }

      const courtButton = event.target.closest("[data-court]");
      if (courtButton) {
        openDrawer(courtButton.dataset.court);
        return;
      }

      if (event.target.id === "closeDrawer") {
        activeDrawerCourtId = null;
        el("drawerMask").classList.remove("open");
        return;
      }

      if (event.target.id === "createFollow") {
        showToast("已模拟生成跟进任务");
        return;
      }

      if (event.target.id === "createSubmit") {
        const court = courts.find((item) => item.id === activeDrawerCourtId);
        const selectedCases = court ? getSelectedDrawerCases(court) : [];
        showToast(selectedCases.length ? `已模拟生成 ${selectedCases.length} 件递交任务` : "请先选择要递交的案件");
        return;
      }
    });

    renderRows();
  </script>
</body>
</html>
