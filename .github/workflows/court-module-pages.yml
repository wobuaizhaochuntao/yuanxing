name: Publish court module prototype

on:
  push:
    branches:
      - main
    paths:
      - 'court-module-interaction/**'
      - '.github/workflows/court-module-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./court-module-interaction

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
